<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳምሪ ማሳጅ | የአስተዳዳሪ ፓናል</title>
    <style>
        body { background-color: #0a0a0c; color: white; font-family: sans-serif; padding: 30px; }
        .container { max-width: 600px; margin: 40px auto; background: #121215; padding: 30px; border-radius: 12px; border: 1px solid #2c2c2e; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h2 { color: #ff2d55; text-align: center; font-size: 1.8rem; margin-bottom: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #8e8e93; font-size: 0.9rem; }
        input[type="text"], input[type="file"] { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #2c2c2e; background: #1c1c1e; color: white; box-sizing: border-box; font-size: 1rem; }
        input[type="text"]:focus { border-color: #ff2d55; outline: none; }
        .btn { width: 100%; background: #ff2d55; color: white; padding: 15px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; transition: background 0.3s; }
        .btn:hover { background: #e02447; }
        .status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 0.95rem; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

    <div class="container">
        <h2>የሳምሪ ማሳጅ ማስተዳደሪያ</h2>
        <p style="text-align: center; color: #8e8e93; font-size: 0.9rem; margin-bottom: 25px;">ፎቶዎችን እና አገልግሎቶችን በቀጥታ መቆጣጠሪያ</p>

        <div class="form-group">
            <label>የአገልግሎቱ ስም (Title)</label>
            <input type="text" id="serviceTitle" placeholder="ምሳሌ፦ የአሮማቴራፒ ማሳጅ">
        </div>

        <div class="form-group">
            <label>አዲስ ፎቶ ይምረጡ</label>
            <input type="file" id="serviceImage" accept="image/*">
        </div>

        <button class="btn" onclick="uploadData()">ወደ ድረ-ገጹ ጫን (Upload)</button>
        <div class="status" id="uploadStatus"></div>
    </div>

    <script>
        // የአንተ የ Firebase ዝግጁ መረጃ
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", // <--- የራስህን API Key እዚህ አስገባ
            authDomain: "samri-masage.firebaseapp.com",
            databaseURL: "https://samri-masage-default-rtdb.firebaseio.com/",
            projectId: "samri-masage",
            storageBucket: "samri-masage.appspot.com",
            messagingSenderId: "25518220416",
            appId: "YOUR_APP_ID" // <--- የራስህን App ID እዚህ አስገባ
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        async function uploadData() {
            const title = document.getElementById('serviceTitle').value;
            const file = document.getElementById('serviceImage').files[0];
            const statusDiv = document.getElementById('uploadStatus');

            if (!title || !file) {
                statusDiv.style.color = "yellow";
                statusDiv.innerText = "እባክዎ መጀመሪያ ስም እና ፎቶ በትክክል ያስገቡ!";
                return;
            }

            statusDiv.style.color = "white";
            statusDiv.innerText = "ፎቶው ወደ ሰርቨር እየተጫነ ነው... እባክዎ ይጠብቁ...";

            try {
                // 1. ፎቶውን ወደ Firebase Storage መጫን
                const storageRef = storage.ref('massages/' + Date.now() + '_' + file.name);
                const uploadTask = await storageRef.put(file);
                const imageUrl = await uploadTask.ref.getDownloadURL();

                // 2. የተሰጠውን የፎቶ ሊንክ እና ስም ወደ ሪልታይም ዳታቤዝ መላክ
                await db.ref("massage_services").push({
                    title: title,
                    imageUrl: imageUrl,
                    createdAt: new Date().toISOString()
                });

                statusDiv.style.color = "#25d366";
                statusDiv.innerText = "በአሪፉ ተጭኗል! ዋናው ድረ-ገጽ ላይ በራስ ሰር ተቀይሯል።";
                
                // ፎርሙን ባዶ ማድረግ
                document.getElementById('serviceTitle').value = '';
                document.getElementById('serviceImage').value = '';

            } catch (error) {
                statusDiv.style.color = "red";
                statusDiv.innerText = "ስህተት አጋጥሟል፦ " + error.message;
            }
        }
    </script>
</body>
</html>
.
