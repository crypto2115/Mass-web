<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Nani Massage & Morocco</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">Nani Massage <span>& Morocco</span></a>
    </header>

    <section class="appointment-form-box">
        <h3>Contact & Booking</h3>
        
        <form action="https://wa.me/251900838801" method="get" target="_blank">
            
            <div class="form-field-group">
                <label>Name *</label>
                <input type="text" name="name" placeholder="Your full name" required>
            </div>

            <div class="form-field-group">
                <label>Phone *</label>
                <input type="tel" name="phone" placeholder="Your phone number" required>
            </div>

            <div class="form-field-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Example@Gmail.com">
            </div>

            <div class="form-field-group">
                <label>Preferred Service</label>
                <select name="service" style="width: 100%; padding: 14px; background: #1e062c; border: 1px solid #4a1566; color: #fff; border-radius: 10px; outline: none; font-size: 0.95rem;">
                    <option value="Full-Body">Full-Body Relaxation</option>
                    <option value="Mobile-Service">Mobile Service (Hotel/Residence)</option>
                    <option value="VIP-Package">VIP Package</option>
                </select>
            </div>

            <button type="submit" class="btn-pink-full">Book Via WhatsApp</button>
        </form>
    </section>

</body>
</html>
