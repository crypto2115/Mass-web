<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Nani Massage & Morocco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Nani Massage <span>& Morocco</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="booking.html" style="color: #ffd700;">Booking</a>
        </div>
    </nav>

    <section class="content">
        <div class="form-box">
            <h3>Book Your Appointment</h3>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Please fill in your details to secure your session.</p>
            
            <form action="https://wa.me/251900838801" method="get" target="_blank">
                
                <label style="display:block; text-align:left; color:#ffd700; margin-bottom:5px;">Name</label>
                <input type="text" name="name" placeholder="Your full name" required>

                <label style="display:block; text-align:left; color:#ffd700; margin-bottom:5px;">Phone</label>
                <input type="tel" name="phone" placeholder="+251 90 083 8801" required>

                <label style="display:block; text-align:left; color:#ffd700; margin-bottom:5px;">Email</label>
                <input type="email" name="email" placeholder="Example@Gmail.com">

                <label style="display:block; text-align:left; color:#ffd700; margin-bottom:5px;">Service Type</label>
                <select name="service">
                    <option value="Full-Body">Full-Body Relaxation</option>
                    <option value="Morocco-Bath">Morocco Bath</option>
                    <option value="VIP-Treatment">VIP Treatment</option>
                </select>

                <button type="submit" class="btn" style="margin-top: 20px;">Book Via WhatsApp</button>
            </form>
        </div>
    </section>

</body>
</html>
